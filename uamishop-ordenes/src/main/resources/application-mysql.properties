# Perfil MySQL: usar con -Dspring.profiles.active=mysql
# En Docker Compose las variables de entorno sobrescriben URL, username y password.

spring.datasource.url=jdbc:mysql://localhost:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=uamishop
spring.datasource.password=uamishop

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Sin consola H2 en este perfil
spring.h2.console.enabled=false

# URL del microservicio de catálogo externalizado (se usará cuando esté levantado)
catalogo.service.url=http://localhost:8081


# Jackson configuration for Java 8 date/time
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.deserialization.ADJUST_DATES_TO_CONTEXT_TIME_ZONE=false
