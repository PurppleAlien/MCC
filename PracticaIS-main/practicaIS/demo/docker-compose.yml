name: uamishop-app


services:
 mysql:
   image: mysql:latest
   container_name: uamishop-mysql
   environment:
     MYSQL_DATABASE: uamishop
     MYSQL_USER: uamishop
     MYSQL_PASSWORD: uamishop
     MYSQL_ROOT_PASSWORD: root
   ports:
     - "3306:3306"
   volumes:
     - mysql_data:/var/lib/mysql
   healthcheck:
     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
     interval: 5s
     timeout: 5s
     retries: 20
     start_period: 60s
   restart: unless-stopped


 uamishop:
  # build:
   #  context: .
    # dockerfile: Dockerfile
   #image: uamishop:latest
   image: angelvm10/uamishop:latest
   container_name: uamishop
   ports:
     - "8080:8080"
   environment:
     SPRING_PROFILES_ACTIVE: mysql
     SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
     SPRING_DATASOURCE_USERNAME: uamishop
     SPRING_DATASOURCE_PASSWORD: uamishop
   depends_on:
     mysql:
       condition: service_healthy
   restart: unless-stopped


volumes:
 mysql_data: