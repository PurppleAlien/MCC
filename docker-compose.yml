name: uamishop-app

services:

  mysql:
    image: mysql:8.0
    container_name: uamishop-mysql
    environment:
      MYSQL_DATABASE: uamishop
      MYSQL_USER: uamishop
      MYSQL_PASSWORD: uamishop
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - uamishop-app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uamishop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-catalogo:
    build:
      context: ./uamishop-catalogo
    container_name: uamishop-catalogo
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-ordenes:
    build:
      context: ./uamishop-ordenes
    container_name: uamishop-ordenes
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-ventas:
    build:
      context: ./uamishop-ventas
    container_name: uamishop-ventas
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_API_URL: http://uamishop-catalogo:8081
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      uamishop-catalogo:
        condition: service_started
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-gateway:
    build:
      context: ./uamishop-gateway
    container_name: uamishop-gateway
    ports:
      - "8090:8090"
    environment:
      VENTAS_URL: http://uamishop-ventas:8083
      ORDENES_URL: http://uamishop-ordenes:8082
      CATALOGO_URL: http://uamishop-catalogo:8081
    depends_on:
      uamishop-catalogo:
        condition: service_started
      uamishop-ordenes:
        condition: service_started
      uamishop-ventas:
        condition: service_started
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-frontend:
    build:
      context: ./uamishop-frontend
    container_name: uamishop-frontend
    ports:
      - "3000:80"
    depends_on:
      uamishop-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - uamishop-app

volumes:
  mysql_data:

networks:
  uamishop-app:
    driver: bridge
