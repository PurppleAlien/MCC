name: uamishop-app

services:

  # ── Infraestructura ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: uamishop-mysql
    environment:
      MYSQL_DATABASE: uamishop
      MYSQL_USER: uamishop
      MYSQL_PASSWORD: uamishop
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      # Ajustes de rendimiento MySQL
      MYSQL_INNODB_BUFFER_POOL_SIZE: 256M
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --innodb-log-file-size=64M
      --innodb-flush-log-at-trx-commit=2
      --sync-binlog=0
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 8s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    networks:
      - uamishop-app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uamishop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── Microservicio Catálogo ───────────────────────────────────────────────
  uamishop-catalogo:
    build:
      context: ./uamishop-catalogo
      dockerfile: Dockerfile
    image: uamishop-catalogo:latest
    container_name: uamishop-catalogo
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop_catalogo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── Microservicio Órdenes ────────────────────────────────────────────────
  uamishop-ordenes:
    build:
      context: ./uamishop-ordenes
      dockerfile: Dockerfile
    image: uamishop-ordenes:latest
    container_name: uamishop-ordenes
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── Microservicio Ventas (Carrito) ───────────────────────────────────────
  uamishop-ventas:
    build:
      context: ./uamishop-ventas
      dockerfile: Dockerfile
    image: uamishop-ventas:latest
    container_name: uamishop-ventas
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_API_URL: "http://uamishop-catalogo:8081"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      uamishop-catalogo:
        condition: service_healthy   # espera a que catálogo esté LISTO antes de arrancar ventas
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── API Gateway ──────────────────────────────────────────────────────────
  uamishop-gateway:
    build:
      context: ./uamishop-gateway
      dockerfile: Dockerfile
    image: uamishop-gateway:latest
    container_name: uamishop-gateway
    ports:
      - "8090:8090"
    environment:
      VENTAS_URL: "http://uamishop-ventas:8083"
      ORDENES_URL: "http://uamishop-ordenes:8082"
      CATALOGO_URL: "http://uamishop-catalogo:8081"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    depends_on:
      uamishop-catalogo:
        condition: service_healthy
      uamishop-ordenes:
        condition: service_healthy
      uamishop-ventas:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── Frontend ─────────────────────────────────────────────────────────────
  uamishop-frontend:
    build:
      context: ./uamishop-frontend
      dockerfile: Dockerfile
    image: uamishop-frontend:latest
    container_name: uamishop-frontend
    ports:
      - "3000:80"
    depends_on:
      - uamishop-gateway
    restart: unless-stopped
    networks:
      - uamishop-app

  # ── Legado (no en uso activo) ─────────────────────────────────────────────
  uamishop:
    build:
      context: ./practicaIS/demo
      dockerfile: Dockerfile
    image: uamishop:latest
    container_name: uamishop
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_SERVICE_URL: "http://uamishop-catalogo:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

volumes:
  mysql_data:

networks:
  uamishop-app:
    driver: bridge
