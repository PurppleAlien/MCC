name: uamishop-app

services:
  mysql:
    image: mysql:latest
    container_name: uamishop-mysql
    environment:
      MYSQL_DATABASE: uamishop
      MYSQL_USER: uamishop
      MYSQL_PASSWORD: uamishop
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - uamishop-app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uamishop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop:
    build:
      context: ./practicaIS/demo
      dockerfile: Dockerfile
    image: uamishop:latest
    container_name: uamishop
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_SERVICE_URL: "http://uamishop-catalogo:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-catalogo:
    build:
      context: ./uamishop-catalogo
      dockerfile: Dockerfile
    image: uamishop-catalogo:latest
    container_name: uamishop-catalogo
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop_catalogo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uamishop-app

  uamishop-ventas:
    build:
      context: ./uamishop-ventas
      dockerfile: Dockerfile
    image: uamishop-ventas:latest
    container_name: uamishop-ventas
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: uamishop
      SPRING_DATASOURCE_PASSWORD: uamishop
      SPRING_RABBITMQ_HOST: rabbitmq
      CATALOGO_API_URL: "http://uamishop-catalogo:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      uamishop-catalogo:
        condition: service_started
    restart: unless-stopped
    networks:
      - uamishop-app

volumes:
  mysql_data:

networks:
  uamishop-app:
    driver: bridge