server:
  port: 8081

spring:
  application:
    name: uamishop-catalogo

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/uamishop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:uamishop}
    password: ${SPRING_DATASOURCE_PASSWORD:uamishop}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
